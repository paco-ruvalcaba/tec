## 1. DEFINICIONES BÁSICAS  

A fin de esclarecer algunos conceptos relacionados con el transporte de energía eléctrica, conviene formular las siguientes definiciones: 

**Conductor:** Este es un término genérico que se aplica a un material, o medio conductivo, confeccionado en forma de alambre o de cable y utilizado para la transmisión de  la corriente entre dos puntos de un sistema eléctrico.  

**Alambre:** Cuerpo cilíndrico, con o sin aislante, utilizado para conducir la electricidad. Su alma conductora está formada por un solo filamento, hilo o hebra (unifilar).  Cuando está provisto de aislante tiene una cubierta o chaqueta protectora.  

![d829c213df10e86e1fe8a8ec64fe622f.png](67747b92974a443ca31a0777aeef0da8.png)

**Cable:** Un conductor de varios alambres, cubiertos o no por un aislante. 

Un cable  puede estar formado así: 
- a) un conjunto de alambres desnudos retorcidos; 
- b) un conjunto de alambres retorcidos, que están cubiertos con un aislante y con chaqueta protectora; 
- c) un conjunto de alambres aislados, dentro de un aislante común y chaqueta  protectora, y 
- d) cables aislados y con chaqueta protectora. Los cordones flexibles que  utilizan los artefactos y equipos portátiles son cables con alambres muy finos. Otras  veces, al cable lo conforman conductores paralelos, como los cables de las antenas de  TV. 
<!-- Ejemplos de diferentes cables, correspondientes a los puntos antes descritos, se  presentan en las imágenes siguientes:  -->

![6f847265816edb6a7e44eaac7beaadcd.png](da4ba8a765024e2f80d7fcdbcf3cedce.png)

## 2. CONDUCTORES DE COBRE VS CONDUCTORES DE ALUMINIO  

Tradicionalmente se han utilizado conductores de cobre y de aluminio para las instalaciones eléctricas. 
<!-- Siempre ha existido alguna controversia en cuanto a la selección del  material adecuado; sin embargo, la tendencia a utilizar el cobre se ha ido acentuando  con el tiempo debido a sus excelentes características de conductividad y ductibilidad  (puede ser fácilmente moldeable). En la Tabla 2.1 se indican las características más  resaltantes de los alambres de cobre y aluminio utilizados en la fabricación de conductores. El tipo de cobre utilizado en la fabricación de conductores es el llamado cobre  electrolítico de alta pureza (99.99%).  -->

![683fa54ad4d7616b48e3a132625a1d04.png](26a11efc554241cfb8d08ae5a7fbd545.png)

En la Tabla se puede observar que el cobre es más pesado que el aluminio. El  poco peso del aluminio hace que los vanos (distancia entre apoyos en el cableado aéreo) sean mayores que en el caso de los conductores de cobre, y que por ello se usen  comúnmente en líneas de distribución, en cuyo caso se refuerza el conductor con un  alma de acero para aumentar la resistencia a la tracción del conjunto. 

Asimismo, en  aquellas aplicaciones donde el peso es un factor fundamental, como en las industrias  aeroespacial y automotriz, se prefiere el aluminio. 

<!-- Se nota, además, que la resistencia a la tracción (el máximo esfuerzo que el material  puede soportar a lo largo de su longitud sin que se rompa) es mayor en el cobre que  en el aluminio. Es importante hacer notar que la conductividad del aluminio es solo  el 60% respecto a la del cobre, lo cual acarrea mayores pérdidas de energía para un  mismo calibre de conductor. -->

El costo es otro aspecto a considerar en la selección del material conductor. Siendo el  cobre más caro que el aluminio, hay que armonizar esta circunstancia con el tipo de  aplicación al cual esté destinado su uso. 

Por otro lado, la gran ductilidad y flexibilidad del cobre inclina la balanza a su favor  en las instalaciones eléctricas residenciales, comerciales e industriales, donde los conductores son doblados en curvaturas de distintos radios. Estas propiedades también  son relevantes en el proceso de fabricación de los alambres y conductores, ya que  facilitan las fases de mecanización de los mismos.  

El cobre, cuando se fabrica, adquiere tres temples o grados de suavidad: duro, semiduro y blando. 

Al cobre de grado blando también se le conoce como cobre recocido.  

El cobre blando presenta la mayor conductividad eléctrica y la mayor flexibilidad,  mientras que el duro, si bien es el de mayor resistencia a la tracción, posee menos  flexibilidad y menos conductividad. De allí que el primero sea preferido en las aplicaciones eléctricas y, en particular, en la fabricación de conductores.  

Los alambres de aluminio son fabricados en diferentes temples y aleaciones, que les  confieren distintas características de dureza y conductividad. Entre los productos terminados de aluminio podemos citar la aleación 6201, conocida como arvidal, de amplio uso en líneas de distribución de energía eléctrica. Su conductividad es del 52,5%  cuando se la compara con la del cobre electrolítico puro. Su temple es duro. 
<!-- Las aleaciones de aluminio se corroen en presencia de la humedad o en ambientes  salinos, al contrario de lo que sucede con el cobre, donde los efectos de la corrosión  son pequeños. Como consecuencia, en la superficie del aluminio se forma una pelí-  cula aislante de óxido que inhibe la realización de buenas soldaduras con los otros  componentes de una instalación eléctrica y que afecta al proceso de fabricación de los  alambres. Se ha atribuido a los cables de aluminio el potencial de producir incendios  debido al sobrecalentamiento de las conexiones entre los conductores y dispositivos  como tomacorrientes e interruptores.   -->
<!-- Los alambres de cobre y de aluminio se obtienen mediante una técnica llamada trefilación, gracias a la cual son llevados a distintos diámetros en varias etapas de estirado.  -->

## 3. PROTECCIÓN DEL CONDUCTOR DE COBRE TERMINADO  
Una vez terminado, y en casos especiales, el alambre de cobre se cubre con una capa  metálica para incrementar su resistencia a la corrosión*. Entre los metales más usados  destacan el estaño, el níquel y la plata. El estaño y la plata protegen al cobre cuando  se aplica la cubierta aislante durante la manufactura. En ese proceso se generan altas  temperaturas y el aislante podría, eventualmente, interactuar con el cobre, produciendo ruptura del aislamiento y corrosión del material. El níquel se usa, fundamentalmente, para mejorar el comportamiento del conductor a altas temperaturas.  

El estaño previene la corrosión del cobre debido a su propia característica anticorrosiva. Además, por ser un agregado normal de la soldadura usada en aplicaciones eléctricas, mejora la capacidad de conexión con otros componentes del sistema. El uso del  estaño está limitado a aplicaciones de baja frecuencia, como las que corresponden a  las instalaciones residenciales. Se le utiliza a temperaturas de hasta 150ºC y su costo  es relativamente bajo si se compara con el de la plata y el níquel. 

La plata se usa en aplicaciones de alta frecuencia, donde su conductividad refuerza la  conductividad del cobre. Su presencia es común en cables coaxiales, en cuyo caso el  alto costo es compensado por la mejoría en la capacidad de conducción del cobre. La  plata se utiliza en combinación con aislamiento de teflón.  

El níquel mejora la capacidad de conducción del cobre a altas temperaturas, al impedir  la oxidación del material hasta 200ºC. Sin embargo, la capa de níquel tiene efectos  adversos sobre la soldadura en los puntos de conexión a componentes externos, razón  por la cual hay que usar procesos especiales. El níquel se utiliza principalmente en la  industria aeroespacial y en aplicaciones militares.  

En ciertos cables de control de sistemas aeroespaciales se utiliza el oro, metal raramente seleccionado para otras aplicaciones debido a su alto costo. En este caso, la alta  conductividad del metal es aprovechada en la terminación de los alambres de cobre.

## 4. CONDUCTOR SÓLIDO (ALAMBRE) VS CONDUCTOR MULTIFILAR (CABLE)  
Cuando un conductor está formado por un solo hilo sólido, filamento, hebra o trenza  es un alambre. Cuando consta de varios alambres retorcidos, constituye un cable y  se le conoce como cable trenzado o entorchado. Cada una de estas configuraciones  tiene ventajas y limitaciones. El alambre sólido es más barato y tiene una resistencia  eléctrica menor que la del cable trenzado. La baja resistencia del alambre sólido, relativa al conductor trenzado, permite una mayor disipación de calor y, por tanto, una  mayor capacidad de corriente para un mismo diámetro del alambre. Por otro lado,  el alambre sólido tiene una flexibilidad menor y, en consecuencia, está más sujeto a  daños por el doblado del alambre y la remoción de la capa aislante cuando se trata de  hacer empalmes o uniones. Un rasguño en la superficie de un conductor sólido puede  extenderse a toda la sección transversal, ocasionando su ruptura. En el caso del conductor trenzado, el rasguño se reduciría a un solo hilo del mismo, dejando inalterado  al resto del alambre.  

La ventaja más importante de los conductores trenzados radica en su mayor flexibilidad, lo que constituye una característica notable cuando se trata de cablear una instalación eléctrica. Las configuraciones del trenzado varían, pero en todas ellas los hilos  están retorcidos siguiendo cierta dirección. En la Fig. se muestran varios arreglos  geométricos para cables trenzados.

## 5. CALIBRE DE LOS CONDUCTORES  

Los conductores de las instalaciones eléctricas tienen generalmente forma cilíndrica  y se especifican mediante cantidades relacionadas con su diámetro o con su sección  transversal. Existen varios sistemas para especificar el calibre de los conductores. En  los albores de la fabricación de alambres (1735, en Gran Bretaña) se consolidó un  método empírico mediante el cual se asignaba un número a un alambre específico (por  ejemplo, el Nº 1) y, de acuerdo con el número de pases que se hacían a una máquina  reductora de calibre (máquina trefiladora), se asignaban números a otros alambres. Así,  el alambre Nº 10 era pasado diez veces por la trefiladora. Los sistemas de calibre más  difundidos son el AWG (American Wire Gauge), el Kilo Circular Mil (kcmil, conocido  originalmente como MCM), el Sistema Métrico de Calibres, el British Imperial Standard Wire Gauge (abreviado: SWG). A continuación describimos cada uno de ellos: 

### American Wire Gauge (AWG): 

Uno de los primeros intentos para adoptar un  sistema geométrico fue hecho por Messrs Brown & Sharpe en 1855. En este sistema,  que posteriormente se conoció como el American Wire Gauge (AWG), cada diámetro  está dado en pulgadas y es multiplicado por 0.890526 para obtener el próximo menor  tamaño. La Tabla 2.2 muestra los calibres para alambres de cobre correspondientes  a los tamaños entre 40 y 0000, este último conocido como “4 cero” o 4/0. Los valores  de la tabla fueron establecidos por Messrs Brown & Sharpe mediante una progresión  geométrica de 39 pasos entre los tamaños 36 AWG y 4/0, de 0.005 y 0.46 pulgadas de  diámetro, respectivamente, cuya expresión es:  

$$D = 0.005 • 92^{[(36 – AWG)/39]}$$

donde: 
D = diámetro del alambre en pulgadas.  
AWG = calibre del alambre según la tabla:

![c9cb384a6b779d8a37e4b904c0a14197.png](2931a769e0124a868e7010edc3ddc002.png)

### Kilo circular mil (kcmil):
Si el diámetro del alambre es mayor que 4/0, su calibre se expresa en kilo circular mil, es decir, en milésimas de pulgadas multiplicadas  por 1000. El diámetro de un alambre, en este sistema, comienza en 250 kcmil y termina en 2000 kcmil. Entonces, un alambre de 250 kcmil tiene un diámetro equivalente a  250000 milésimas de pulgada y un alambre de 2000 kcmil tiene un diámetro equivalente a 2000000 milésimas de pulgada. Al contrario de lo que sucede con el sistema  AWG, los diámetros se incrementan a medida que lo hace la designación del alambre.  Así, un conductor de 500 kcmil tiene menor diámetro que uno de calibre 1250 kcmil.  Todavía, en algunos textos, para designar el sistema kcmil, se utiliza el término MCM,  que tiene el mismo significado. Así, un conductor de calibre 250 kcmil es equivalente  a 250 MCM. En la Tabla 2.3 se indican los diámetros de los conductores en el sistema  kcmil. En todos los casos se trata de conductores con alambres trenzados, tal como lo  exige la norma.  

### Sistema métrico de calibres: 
En este sistema el calibre es diez veces el diámetro en milímetros. Así, un alambre calibre 50 en el sistema métrico tiene un diámetro  de 5 mm. El diámetro aumenta con el número del calibre, al contrario de lo que sucede  con el sistema AWG. En la práctica, la mayoría de las veces, el diámetro en el sistema  métrico es expresado en milímetros, en lugar de los calibres correspondientes a este  sistema. En la Tabla 2.4 se muestran los diámetros, en pulgadas y en mm, para algunos conductores, desde el calibre 16 AWG hasta el calibre 2000 kcmil.  

 ### British Imperial Standard Wire Gauge (SWG): 
En este sistema el calibre  menor es el 50, de 0.001 pulgadas, y el mayor es el 7/0, de 0.500 pulgadas. En la Tabla 2.5 se indican algunos de los diámetros para distintos calibres.  Finalmente, la Tabla 2.6 (ver Tabla A1 en Apéndice A) sintetiza las características  de los conductores desnudos calibres AWG y kcmil, más frecuentemente utilizados en  las instalaciones eléctricas.  

![4b76ab26ca231060a9a0c8c1ed7c025f.png](9b5d13ec53a74d57adc27edd0567405a.png)

## 6. AISLANTES DE LOS CONDUCTORES  

El aislante de un conductor tiene dos propósitos: evitar el contacto con otros conductores, tierra o demás objetos capaces de conducir la electricidad (incluido el cuerpo  humano), y proteger al conductor de daños por abrasión y esfuerzos desarrollados  durante su almacenamiento o instalación.  

Condiciones ambientales: El tipo de aislamiento determina el ambiente donde los  conductores se van a utilizar. Los conductores usados en instalaciones interiores están  menos sujetos a las inclemencias del sol y del agua, que afectan notablemente a los  conductores para uso exterior. De allí que estos últimos deben estar protegidos contra el agua y las radiaciones ultravioleta. El aislante de los conductores colocados directamente en la tierra debe ser capaz de soportar la acción corrosiva del suelo. Además  de estas consideraciones, la estabilidad térmica y química del aislamiento es un factor  a tener en cuenta.  

Corriente en un conductor: El tipo de aislamiento es un factor importante en la corriente que es capaz de soportar un conductor, pues el aumento de temperatura, debido  al paso de la corriente, puede dañar al aislante.  

Bajas y altas frecuencias: La presencia del aislante en conductores utilizados a bajas  frecuencias, como es el caso de instalaciones eléctricas residenciales, está destinada a  impedir cortocircuitos con otros conductores y con elementos capaces de conducir la  corriente eléctrica en las cercanías de la instalación. A altas frecuencias, sin embargo,  las propiedades dieléctricas del aislante adquieren importancia debido a sus efectos  sobre la velocidad de propagación de la señal eléctrica y a la impedancia de los conductores y cables. 

Efectos químicos y térmicos: Los factores químicos que afectan a los aislantes de  un conductor incluyen la estabilidad frente a solventes limpiadores, la oxidación a  temperaturas elevadas y la combustibilidad. Los efectos térmicos incluyen el efecto  de la temperatura sobre la estructura del aislante y sobre las características de tensión  y flexibilidad. Estos efectos dependen, fundamentalmente, de la estructura intrínseca  del aislante. 

Materiales aislantes. Básicamente, existen  dos tipos de aislamientos en los conductores:  el aislamiento primario, aplicado directamente al conductor mediante un proceso conocido como extrusión, cuya función es aislar a los alambres entre sí, y el aislamiento  secundario, en forma de chaquetas aislantes  que sirven de cubiertas a los cables con varios conductores en su interior. En la Fig. 2.2  se indican ambos tipos de aislamientos. 

![3510021316506bdd0d30d18728350e41.png](6fb40ac434834b5b9b5e0306b5504b1b.png)

En viejos conductores se utilizaban cubiertas de tela o de goma. Estas no se utilizan  actualmente porque se deterioran con el tiempo. Hoy en día se utilizan sobre todo  materiales termoplásticos y termoestables como cubiertas de los conductores. Estos  materiales se obtienen a partir de la polimerización de hidrocarburos y son llamados,  en consecuencia, polímeros. Entre los materiales más comunes usados como aislantes  primarios encontramos los siguientes:  Cloruro de polivinilo (PVC): Este aislante predomina en aplicaciones de bajas frecuencias, típicas de las instalaciones residenciales, y tiene amplia difusión desde el  punto de vista comercial debido a su costo relativamente bajo y a sus buenas propiedades mecánicas y eléctricas. La formulación química que se emplea para fabricarlos incluye una gran variedad de componentes plastificantes y otros aditivos, que confieren diversos grados de flexibilidad, dureza y resistencia a la abrasión. El PVC  tiene una alta resistencia dieléctrica y buenas propiedades aislantes; sin embargo, los  efectos capacitivos que introduce a altas frecuencias limitan su uso en ese espectro  de operación. Según su formulación química, el PVC puede cubrir un rango de temperaturas entre –55ºC y 105ºC, aunque es más común encontrar formulaciones para  trabajar entre –20ºC y 80ºC.  

Poliolefinas: Este material incluye polietileno (PE), polipropileno (PP) y otros materiales derivados de aquellos. Las propiedades del aislamiento del polietileno se pueden  variar controlando la densidad del polímero. El polietileno de baja densidad (LDPE)  es un polímero resistente y flexible que encuentra su uso principal en aplicaciones de  alta frecuencia y por debajo de 80ºC. El polietileno de alta densidad (HDPE) tiene  mayor fortaleza y es más resistente a la abrasión. Su uso se extiende a temperaturas  de hasta 90ºC.  

Hidrocarburos fluorados: Estos polímeros, entre los cuales destacan el PTFE (politetrafluoruro etileno), el PFEP (polifluoruro etileno propileno) y el PVDF (polivinideno  fluorado), tienen mejores propiedades térmicas, eléctricas y mecánicas, comparados  con las poliolefinas. Su costo, sin embargo, es mayor que el de las poliolefinas. 

![50dd3d22e396bf064a3b2bd91f46e62d.png](39a7ca6ee7a3490e92b104a1ee525171.png)


Los materiales siguientes son utilizados como aislantes secundarios en cables:  

Polycloropreno: Conocido también con el nombre comercial de Neopreno, se presenta en varias formulaciones según los aditivos que se le agreguen (plastificantes,  antioxidantes y agentes vulcanizadores). Este aislante posee buenas propiedades mecánicas, además de ser resistente a la llama, a aceites y solventes.  

Goma de etilenpropileno: Esta goma, conocida por sus siglas EPR (etileno propileno reticulado), es un copolímero de poliolefina con buenas características eléctricas y mecá-  nicas. Es resistente a factores ambientales y a muchos solventes como álcalis y ácidos.  

Poliuretano: Aunque las características del poliuretano no lo hacen apropiado para su  uso como aislamiento secundario, sus propiedades mecánicas, como la resistencia a rasgaduras y a los choques, hacen que sea seleccionado en ciertas aplicaciones. Es muy  inflamable, pero puede hacerse resistente a la llama mediante agregado de aditivos.  

Elastómeros termoplásticos: Un elastómero es un material que vuelve a su estado  original una vez deformado. Conocidos por sus siglas en inglés TPE, sus propiedades  mecánicas y eléctricas hacen que sean un buen material para cubiertas de cables. Tienen una adecuada flexibilidad a bajas temperaturas, una constante dieléctrica baja y  estable y buenas características de estiramiento.  

En la Tabla 2.8 se hace un resumen de las características más resaltantes de estos  materiales.

## 17. Diagrama de flujo para calcular el calibre de un conductor

El diagrama de flujo de la Fig. 2.25 establece los pasos necesarios para determinar el  calibre de un conductor a partir del conocimiento de todo lo discutido en este capítulo.  Como se puede deducir del mismo, una vez calculada la ampacidad del conductor, se  debe proceder a estimar la caída de voltaje para establecer si el calibre seleccionado  es el adecuado.  

La rama de la izquierda del diagrama de flujo define los pasos a dar para proteger el  aislamiento del conductor y las terminaciones del circuito. La rama de la derecha tiene  que ver con la caída de voltaje en el sistema, para asegurar que esta no supere el 2% o  el 3%, según se trate de circuitos ramales o de alimentadores.
