## Cómo calcular el calibre de un cable

Los factores que debemos considerar al elegir un cable son los siguientes:

1. La corriente requerida
2. La distancia de la instalación
3. Tipo de carga
4. Tipo de cable
---
# Ejemplo

## Cálculo de cable para circuito de cocina

- Cargas en una cocina:  
  - Licuadora: 300 W  
  - Lavavajillas: 950 W  
  - Microondas: 750 W  
  - Refrigerador: 300 W  
  - Horno tostador: 600 W  
  - Batidora: 450 W  
- **Total: 3350 W**

- [Tabla de calibres](https://paco-ruvalcaba.github.io/tec/conductores#/7/5)
